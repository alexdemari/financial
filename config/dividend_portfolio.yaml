# Carteira de dividendos - configuracao
# Atualizado: 2026-06-11
# Metodologia: preco teto = dividendo_base / min_dy
#   ceiling_method: average_6y = media anual dos ultimos 6 anos completos (AGF)
#                   trailing   = dividendo TTM (ultimos 12 meses)
# min_dy por ativo calibrado com base no DY historico estrutural real

settings:
  min_dy: 0.06          # global — fallback para ativos sem min_dy proprio
  dy_source: trailing   # default — sobrescrito por ceiling_method por ativo
  currency_br: BRL
  currency_us: USD

# Ativos BR - sufixo .SA adicionado automaticamente para yfinance
br_assets:
  - ticker: TAEE11
    sector: Energia
    name: Taesa — Transmissora Alianca de Energia Eletrica
    target_weight: 0.25
    ceiling_method: average_6y
    min_dy: 0.06
    backtest_ref: "2026-06-11"
    backtest_precision: null
    backtest_signals_per_year: null
    backtest_notes: >
      Substituiu EGIE3 (11/06/2026). DY TTM 8.41% vs EGIE3 3.6%.
      Transmissora pura — receita garantida por contrato ANEEL independente
      de consumo. avg_6y R$3.56, teto R$59.35 (6%), preco atual R$38.94
      — margem +52%. min_dy 6% adequado: DY historico estrutural 6-9%.
      Historico 6 anos completos sem distorcao (2020-2025).

  - ticker: ITSA4
    sector: Bancos
    name: Itausa
    target_weight: 0.25
    ceiling_method: trailing
    min_dy: 0.06
    backtest_ref: "2026-06-11"
    backtest_notes: >
      ceiling_method alterado de average_6y para trailing (11/06/2026).
      avg_6y distorcido: crescimento 14x de dividendos (R$0.12 em 2020
      para R$1.72 em 2025). TTM R$1.23 (DY 9.81%) e o dado real.
      Teto TTM/6% = R$20.48 vs preco R$12.53 — margem +63%.

  - ticker: BBSE3
    sector: Seguros
    name: BB Seguridade
    target_weight: 0.20
    ceiling_method: average_6y
    min_dy: 0.06
    backtest_ref: "2026-06-11"
    backtest_notes: >
      Criterio correto. DY historico 6-12%, crescimento consistente
      (R$0.88 em 2020 para R$4.26 em 2025). avg_6y R$2.41,
      teto R$40.11 (6%), preco R$37.58 — margem +6.7%.

  - ticker: VIVT3
    sector: Telecom
    name: Telefonica Brasil
    target_weight: 0.17
    ceiling_method: trailing
    min_dy: 0.06
    backtest_ref: "2026-06-11"
    backtest_notes: >
      ceiling_method alterado de average_6y para trailing (11/06/2026).
      avg_6y penaliza crescimento recente de dividendos.
      TTM R$2.42 (DY 7.27%) supera o criterio de 6%.
      Teto TTM/6% = R$40.33 vs preco R$33.30 — margem +21%.

  - ticker: SAPR4
    sector: Saneamento
    name: Sanepar
    target_weight: 0.13
    ceiling_method: average_6y
    min_dy: 0.045
    backtest_ref: "2026-06-11"
    backtest_notes: >
      min_dy reduzido de 6% para 4.5% (11/06/2026).
      DY estrutural do setor de saneamento BR e 4-5%, nao 6%.
      avg_6y correto apos excluir ano corrente incompleto = R$0.274.
      Teto avg_6y/4.5% = R$6.09 vs preco R$7.18 — OVERPRICED hoje.

